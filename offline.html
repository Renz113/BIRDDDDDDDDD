<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Flappy Bird Club</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .offline-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      padding: 20px;
    }
  </style>
</head>

<body>
  <div class="page-shell offline-container">
    <section class="card banner-card">
      <h1>You're Offline</h1>
      <p>Flappy Bird Club is ready for repeat visits, but it looks like you aren't connected to the internet right now.
      </p>
      <p>Once you're back online, you can sync your scores and see the leaderboard.</p>
      <button class="primary-button" onclick="window.location.reload()">Try Again</button>
    </section>
  </div>
</body>

</html>
